openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: roadmap
    description: Skill roadmap operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /roadmap/generate:
    post:
      operationId: generateRoadmap
      tags: [roadmap]
      summary: Generate a learning roadmap for a skill
      description: Uses AI to generate a list of learning tasks for the given skill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRoadmapRequest"
      responses:
        "200":
          description: Generated roadmap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateRoadmapResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    GenerateRoadmapRequest:
      type: object
      properties:
        skill:
          type: string
          description: The skill the user wants to learn
      required:
        - skill
    RoadmapTask:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
      required:
        - id
        - title
        - description
    GenerateRoadmapResponse:
      type: object
      properties:
        skill:
          type: string
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/RoadmapTask"
      required:
        - skill
        - tasks
